<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CeylonTails – log In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-btn: #D4A017;
    --gold-text: #C9941A;
    --gold-hover: #E8B830;
    --navy: #060E1A;
    --navy-card: #0D1E30;
    --navy-input: #0A1828;
    --border: rgba(255,255,255,0.07);
    --text: #D8E2EF;
    --text-muted: #4A6078;
    --text-placeholder: #3A5068;
    --white: #FFFFFF;
  }

  html, body {
    height: 100vh;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* subtle radial glow */
  body::before {
    content: '';
    position: fixed;
    top: -10%; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(201,148,26,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── WRAPPER ── */
  .wrapper {
    position: relative; z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 20px 0;
  }

  /* ── BRAND ── */
  .brand {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeDown 0.6s 0.1s ease forwards;
  }
  .brand-logo { height: 32px; width: auto; display: block; }
  #logoText {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700;
    color: var(--gold-text); letter-spacing: 1px;
  }
  #logoText span { font-style: italic; color: #E8E0D0; }
  .brand-tagline {
    font-size: 10px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold-text);
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 400px;
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    opacity: 0;
    animation: fadeUp 0.65s 0.25s ease forwards;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700;
    color: var(--white); text-align: center;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 12px; color: var(--text-muted);
    text-align: center; margin-bottom: 24px;
  }

  /* ── FORM ── */
  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold-text); margin-bottom: 6px;
  }

  .input-wrap { position: relative; }

  .input-wrap input {
    width: 100%;
    background: var(--navy-input);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 11px 42px 11px 14px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .input-wrap input::placeholder { color: var(--text-placeholder); }
  .input-wrap input:focus {
    border-color: var(--gold-text);
    box-shadow: 0 0 0 3px rgba(201,148,26,0.1);
  }
  .input-wrap input.error { border-color: #D94F4F; }

  .input-icon {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none; display: flex;
  }
  .toggle-pw { pointer-events: all; cursor: pointer; transition: color 0.2s; }
  .toggle-pw:hover { color: var(--gold-text); }

  .error-msg { font-size: 10px; color: #D94F4F; margin-top: 4px; display: none; }
  .error-msg.show { display: block; }

  /* ── FORGOT PASSWORD ── */
  .forgot-row {
    display: flex; justify-content: flex-end;
    margin-top: -6px; margin-bottom: 20px;
  }
  .forgot-row a {
    font-size: 11px; color: var(--gold-text); text-decoration: none;
    transition: opacity 0.2s;
  }
  .forgot-row a:hover { opacity: 0.75; text-decoration: underline; }

  /* ── SUBMIT ── */
  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, #D4A017, #B8890E);
    color: #050D18;
    border: none; border-radius: 7px;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.25s;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(201,148,26,0.25);
  }
  .btn-submit:hover {
    background: linear-gradient(135deg, #E8B830, #C9941A);
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(201,148,26,0.4);
  }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit.success { background: linear-gradient(135deg, #27AE60, #1E8449); pointer-events: none; }
  .btn-submit:disabled { opacity: 0.7; pointer-events: none; }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span {
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
  }

  /* ── SOCIAL ── */
  .social-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 20px;
  }
  .btn-social {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: var(--navy-input);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    padding: 10px 10px; cursor: pointer; transition: all 0.22s;
  }
  .btn-social:hover { border-color: rgba(255,255,255,0.15); background: #0F2035; }

  /* ── REGISTER LINK ── */
  .register-row {
    text-align: center; font-size: 12px; color: var(--text-muted);
  }
  .register-row a { color: var(--gold-text); font-weight: 600; text-decoration: none; }
  .register-row a:hover { text-decoration: underline; }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 20px 12px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* shake animation for wrong credentials */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="wrapper">

  <!-- BRAND -->
  <div class="brand">
    <img src="images/logo.png"
         onerror="this.style.display='none'; document.getElementById('logoText').style.display='block';"
         alt="CeylonTails" class="brand-logo">
    <div id="logoText" style="display:none;">Ceylon<span>Tails</span></div>
    <span class="brand-tagline">Premium Travel Experience</span>
  </div>

  <!-- CARD -->
  <div class="card" id="card">

    <h1 class="card-title">Welcome Back</h1>
    <p class="card-sub">log in to access your travel dashboard.</p>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
        <span class="input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </span>
      </div>
      <p class="error-msg" id="emailErr">Please enter a valid email address.</p>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="input-icon toggle-pw" id="togglePw">
          <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
      <p class="error-msg" id="passErr">Please enter your password.</p>
    </div>

    <!-- Forgot password -->
    <div class="forgot-row">
      <a href="#">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button class="btn-submit" id="submitBtn" onclick="handleLogin()">log In</button>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Social -->
    <div class="social-row">
      <button class="btn-social">
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
      <button class="btn-social">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
    </div>

    <!-- Register link -->
    <div class="register-row">
      Don't have an account? <a href="register2.html">Create one</a>
    </div>

  </div>
</div>

<footer>© 2024 CeylonTails. All rights reserved.</footer>

<script>
  // Password toggle
  const togglePw = document.getElementById('togglePw');
  const pwInput  = document.getElementById('password');
  const eyeIcon  = document.getElementById('eyeIcon');
  const eyeOpen   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? eyeClosed : eyeOpen;
  });

  // Error helpers
  function showErr(inputId, errId) {
    document.getElementById(inputId).classList.add('error');
    document.getElementById(errId).classList.add('show');
  }
  function clearErr(inputId, errId) {
    document.getElementById(inputId).classList.remove('error');
    document.getElementById(errId).classList.remove('show');
  }

  document.getElementById('email').addEventListener('input',    () => clearErr('email',    'emailErr'));
  document.getElementById('password').addEventListener('input', () => clearErr('password', 'passErr'));

  // Login handler
  function handleLogin() {
    let valid = true;
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('email', 'emailErr'); valid = false; }
    else clearErr('email', 'emailErr');

    if (!pass) { showErr('password', 'passErr'); valid = false; }
    else clearErr('password', 'passErr');

    if (!valid) {
      // shake card on error
      const card = document.getElementById('card');
      card.classList.remove('shake');
      void card.offsetWidth; // reflow
      card.classList.add('shake');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Signing In…';
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = '✓ Welcome Back!';
      btn.classList.add('success');
    }, 1400);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
